    <text x="256" y="290" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="150" font-weight="700" letter-spacing="16" fill="#00e5ff" text-anchor="middle">QFC</text>
  </g>

  <!-- Bottom line -->
  <line x1="140" y1="350" x2="372" y2="350" stroke="url(#cyan3)" stroke-width="1" opacity="0.4"/>

  <!-- Version tag style -->
