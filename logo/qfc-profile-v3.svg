  <!-- Corner brackets - top right -->
  <path d="M 372 100 L 412 100 L 412 140" fill="none" stroke="url(#cyan3)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Corner brackets - bottom left -->
  <path d="M 100 372 L 100 412 L 140 412" fill="none" stroke="url(#cyan3)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
