<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="256" fill="url(#bg7)"/>

  <!-- Concentric arcs - partial circles -->
  <path d="M 256 60 A 196 196 0 0 1 452 256" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.12"/>
  <path d="M 452 256 A 196 196 0 0 1 256 452" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.08"/>
  <path d="M 256 452 A 196 196 0 0 1 60 256" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.12"/>
  <path d="M 60 256 A 196 196 0 0 1 256 60" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.08"/>

  <!-- Speed lines radiating from center -->
  <g opacity="0.08" stroke="#22d3ee" stroke-width="1">
    <line x1="256" y1="80" x2="256" y2="130"/>
    <line x1="380" y1="130" x2="350" y2="165"/>
    <line x1="432" y1="256" x2="382" y2="256"/>
    <line x1="380" y1="382" x2="350" y2="347"/>
    <line x1="256" y1="432" x2="256" y2="382"/>
    <line x1="132" y1="382" x2="162" y2="347"/>
    <line x1="80" y1="256" x2="130" y2="256"/>
    <line x1="132" y1="130" x2="162" y2="165"/>
  </g>

  <!-- Rounded rectangle badge -->
  <rect x="80" y="160" width="352" height="192" rx="24" fill="#0f172a" fill-opacity="0.6" stroke="url(#grad7)" stroke-width="1.5" opacity="0.4"/>

  <!-- QFC large -->
  <g filter="url(#glow7)">
    <text x="256" y="295" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="150" font-weight="700" letter-spacing="10" fill="url(#grad7)" text-anchor="middle">QFC</text>
  </g>

  <!-- Small label above -->
  <text x="256" y="190" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="8" fill="#22d3ee" opacity="0.35" text-anchor="middle">BLOCKCHAIN</text>

  <!-- Bottom -->
  <text x="256" y="390" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="14" fill="#22d3ee" opacity="0.4" text-anchor="middle">NETWORK</text>
</svg>
