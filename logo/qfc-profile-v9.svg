<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="grad9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="silver9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="glow9">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="256" fill="url(#bg9)"/>

  <!-- Outer gold ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#grad9)" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#grad9)" stroke-width="0.5" opacity="0.3"/>

  <!-- QFC gold monogram -->
  <g filter="url(#glow9)">
    <text x="256" y="285" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="700" letter-spacing="10" fill="url(#grad9)" text-anchor="middle">QFC</text>
  </g>

  <!-- Decorative line -->
  <line x1="145" y1="310" x2="367" y2="310" stroke="url(#grad9)" stroke-width="1" opacity="0.4"/>

  <!-- Tagline silver -->
  <text x="256" y="360" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" letter-spacing="10" fill="url(#silver9)" opacity="0.6" text-anchor="middle">NETWORK</text>

  <!-- Small stars/dots -->
  <circle cx="145" cy="310" r="2" fill="#fbbf24" opacity="0.5"/>
  <circle cx="367" cy="310" r="2" fill="#fbbf24" opacity="0.5"/>
</svg>
