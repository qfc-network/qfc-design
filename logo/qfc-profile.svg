<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2847"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="50%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0288d1" stop-opacity="0"/>
    </linearGradient>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="round">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" clip-path="url(#round)">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#4fc3f7" stroke-width="0.5"/>
  </g>

  <!-- Decorative arc - top right -->
  <path d="M 380 120 A 160 160 0 0 1 420 200" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.25"/>

  <!-- Decorative arc - bottom left -->
  <path d="M 92 312 A 160 160 0 0 1 132 392" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.25"/>

  <!-- Small dot accents -->
  <circle cx="380" cy="118" r="2.5" fill="#4fc3f7" opacity="0.5"/>
  <circle cx="132" cy="394" r="2.5" fill="#4fc3f7" opacity="0.5"/>

  <!-- QFC Monogram -->
  <g filter="url(#text-glow)">
    <text x="256" y="310" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="180" font-weight="700" letter-spacing="8" fill="url(#text-grad)" text-anchor="middle">QFC</text>
  </g>

  <!-- Underline accent bar -->
  <rect x="110" y="330" width="292" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Subtle tagline -->
  <text x="256" y="372" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" letter-spacing="12" fill="#4fc3f7" opacity="0.6" text-anchor="middle">NETWORK</text>
</svg>
